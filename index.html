<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>纯净透镜 - 强折射变形测试</title>
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Roboto", sans-serif;
            background-color: #000;
        }

        /* 隐藏的 SVG 滤镜：用于制造强烈的物理折射 */
        .svg-filters {
            position: absolute;
            width: 0;
            height: 0;
            pointer-events: none;
        }

        /* ================= 背景滑动容器 ================= */
        .bg-slider {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }
        .bg-slider::-webkit-scrollbar {
            display: none;
        }

        .bg-page {
            flex: 0 0 100vw;
            height: 100vh;
            scroll-snap-align: center;
            position: relative;
        }

        /* 背景1：经典网格（最容易看出线条被折射扭曲） */
        .page-1 {
            background-color: #e2edf8;
            background-image: 
                linear-gradient(#9cbce0 2px, transparent 2px),
                linear-gradient(90deg, #9cbce0 2px, transparent 2px);
            background-size: 36px 36px;
            background-position: center center;
        }

        /* 背景2：斜向条纹（测试边缘错位折射） */
        .page-2 {
            background: repeating-linear-gradient(
                -45deg,
                #d1dceb,
                #d1dceb 20px,
                #e2edf8 20px,
                #e2edf8 40px
            );
        }

        /* 背景3：色块与圆（测试大面积色彩拉伸） */
        .page-3 {
            background: #e2edf8;
            overflow: hidden;
        }
        .page-3::before {
            content: '';
            position: absolute;
            top: 30%; left: 10%;
            width: 150px; height: 150px;
            background: #4a90e2;
            border-radius: 50%;
        }
        .page-3::after {
            content: '';
            position: absolute;
            bottom: 20%; right: 10%;
            width: 200px; height: 200px;
            background: #50e3c2;
            border-radius: 50%;
        }

        /* 底部滑动提示 */
        .swipe-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 0, 0, 0.6);
            font-size: 14px;
            font-weight: 500;
            pointer-events: none;
            z-index: 10;
            background: rgba(255,255,255,0.4);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ================= 悬浮在屏幕中央的透镜气泡 ================= */
        .glass-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 5;
            padding: 16px;
        }

        .liquid-glass-card {
            position: relative;
            width: 100%;
            max-width: 380px;
            height: 84px;
            border-radius: 42px;
            pointer-events: auto; 
            
            /* 1. 绝对纯透明，无任何底色 */
            background: transparent;
            
            /* 2. 核心：调用强化后的强折射滤镜 */
            backdrop-filter: url(#strong-refraction);
            -webkit-backdrop-filter: url(#strong-refraction);
            
            /* 3. 彻底去除白光！只保留极微弱的暗色内阴影勾勒透镜边缘厚度 */
            box-shadow: 
                inset 0 1px 3px rgba(0, 0, 0, 0.05),
                inset 0 -1px 3px rgba(0, 0, 0, 0.02),
                0 8px 20px rgba(0, 0, 0, 0.04);
            
            /* 增加一个极细的半透明边框，模拟玻璃切割边缘 */
            border: 1px solid rgba(0, 0, 0, 0.03);
            
            display: flex;
            align-items: center;
            padding: 0 20px 0 12px;
            
            transform-origin: center center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
            will-change: transform, box-shadow;
        }

        /* 长按悬浮状态 */
        .liquid-glass-card.is-floating {
            animation: float-anim 2s ease-in-out infinite;
            box-shadow: 
                inset 0 1px 3px rgba(0, 0, 0, 0.05),
                inset 0 -1px 3px rgba(0, 0, 0, 0.02),
                0 20px 30px rgba(0, 0, 0, 0.08); /* 悬浮时外部阴影加深 */
        }

        @keyframes float-anim {
            0%, 100% { transform: translateY(0) scale(1.02); }
            50% { transform: translateY(-10px) scale(1.02); }
        }

        /* 内部元素样式 */
        .icon-box {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.7); /* 稍微透一点底 */
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 14px;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .icon-box svg {
            width: 22px;
            height: 22px;
            color: #111827;
        }

        .text-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .title {
            font-size: 16px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 4px;
        }

        .desc {
            font-size: 12px;
            color: #4b5563;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .arrow-icon {
            width: 16px;
            height: 16px;
            color: #6b7280;
            margin-left: 10px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <!-- 强化版 SVG 物理折射滤镜 -->
    <svg class="svg-filters">
        <filter id="strong-refraction" color-interpolation-filters="sRGB">
            <!-- 1. 生成基础波纹 -->
            <feTurbulence type="fractalNoise" baseFrequency="0.008 0.015" numOctaves="1" result="noise" />
            <!-- 2. 增强对比度，让波纹的峰谷更陡峭，从而产生更强烈的拉扯感 -->
            <feComponentTransfer in="noise" result="enhancedNoise">
                <feFuncR type="linear" slope="2" intercept="-0.5"/>
                <feFuncG type="linear" slope="2" intercept="-0.5"/>
            </feComponentTransfer>
            <!-- 3. 置换背景，scale 提升至 45 (之前是25)，制造强烈的透镜扭曲 -->
            <feDisplacementMap in="SourceGraphic" in2="enhancedNoise" scale="45" xChannelSelector="R" yChannelSelector="G" />
            <!-- 4. 叠加极轻微的模糊，柔化折射边缘的锯齿 -->
            <feGaussianBlur stdDeviation="0.5" />
        </filter>
    </svg>

    <!-- 背景滑动层 -->
    <div class="bg-slider">
        <div class="bg-page page-1"></div>
        <div class="bg-page page-2"></div>
        <div class="bg-page page-3"></div>
    </div>

    <!-- 底部提示 -->
    <div class="swipe-hint">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 8l4 4-4 4"></path>
            <path d="M3 12h18"></path>
            <path d="M7 8l-4 4 4 4"></path>
        </svg>
        左右拖拽背景测试折射
    </div>

    <!-- 固定在中央的透镜气泡 -->
    <div class="glass-wrapper">
        <div class="liquid-glass-card" id="liquidCard">
            <div class="icon-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="6" y="3" width="12" height="18" rx="3.5" ry="3.5"></rect>
                    <circle cx="12" cy="16.5" r="1" fill="currentColor" stroke="none"></circle>
                </svg>
            </div>
            
            <div class="text-content">
                <div class="title">查看 TA 的手机</div>
                <div class="desc">顾凛 同意了你的请求，点击即可查看通...</div>
            </div>

            <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </div>
    </div>

    <script>
        const card = document.getElementById('liquidCard');
        let pressTimer;
        let isLongPress = false;

        const handlePressDown = (e) => {
            isLongPress = false;
            card.classList.remove('is-floating');
            
            card.style.transition = 'transform 0.2s cubic-bezier(0.25, 1, 0.5, 1)';
            card.style.transform = 'scale(0.94) scaleX(1.03) scaleY(0.92)';

            pressTimer = setTimeout(() => {
                isLongPress = true;
                card.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
                card.style.transform = ''; 
                card.classList.add('is-floating');
            }, 350); 
        };

        const handlePressUp = (e) => {
            clearTimeout(pressTimer);
            
            if (!isLongPress) {
                card.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
                card.style.transform = 'scale(1.02) scaleX(0.97) scaleY(1.03)';
                
                setTimeout(() => {
                    card.style.transform = 'scale(1)';
                }, 150);
            } else {
                card.classList.remove('is-floating');
                card.style.transform = 'scale(1)';
            }
        };

        card.addEventListener('touchstart', handlePressDown, { passive: true });
        card.addEventListener('touchend', handlePressUp);
        card.addEventListener('touchcancel', handlePressUp);

        card.addEventListener('mousedown', handlePressDown);
        card.addEventListener('mouseup', handlePressUp);
        card.addEventListener('mouseleave', () => {
            clearTimeout(pressTimer);
            card.classList.remove('is-floating');
            card.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
